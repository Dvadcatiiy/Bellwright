<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellwright - Персонажи</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: text;
        }
        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: #1e1f22;
            margin: 0;
            padding: 20px;
            color: #e4e6eb;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            color: #58c4dd;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            color: #b0b3b8;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .toolbar {
            background: #2d2e32;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }
        .btn {
            background: #3a3b3f;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
        }
        .btn-primary {
            background: #2c6e9e;
        }
        .btn-primary:hover {
            background: #1e5a85;
        }
        .btn-danger {
            background: #9e2c2c;
        }
        .btn-danger:hover {
            background: #7a2222;
        }
        .btn-warning {
            background: #9e7e2c;
        }
        .btn-warning:hover {
            background: #7a6222;
        }
        .btn-success {
            background: #2c6e2c;
        }
        .btn-success:hover {
            background: #1e5a1e;
        }
        .btn:hover {
            filter: brightness(1.05);
        }
        .filter-bar {
            background: #2d2e32;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
        }
        .filter-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #58c4dd;
        }
        .filter-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-item label {
            font-size: 12px;
            color: #b0b3b8;
        }
        .filter-item select, .filter-item input {
            background: #3a3b3f;
            border: 1px solid #5a5c62;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            min-width: 150px;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .table-wrapper {
            background: #2d2e32;
            border-radius: 12px;
            overflow-x: auto;
            padding: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1200px;
        }
        th, td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #3e4045;
            vertical-align: middle;
        }
        th {
            background: #242527;
            color: #58c4dd;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: #333539;
        }
        td {
            background: #2d2e32;
        }
        input.editable {
            background: #3a3b3f;
            border: 1px solid #5a5c62;
            color: white;
            padding: 6px;
            border-radius: 4px;
            width: 100%;
            text-align: center;
            font-size: 12px;
        }
        input.editable:focus {
            outline: none;
            border-color: #58c4dd;
        }
        .delete-row {
            background: #9e2c2c;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            padding: 4px 8px;
            font-size: 11px;
        }
        .delete-row:hover {
            background: #c23b3b;
        }
        .add-row {
            margin-top: 15px;
            background: #2c6e9e;
            border: none;
            padding: 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
        }
        .add-row:hover {
            background: #1e5a85;
        }
        .count-info {
            margin: 15px 0 10px;
            color: #b0b3b8;
        }
        .status-bar {
            background: #2d2e32;
            padding: 8px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #8a9a6a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-status {
            font-size: 12px;
        }
        .sync-status.synced { color: #6a9a4a; }
        .sync-status.syncing { color: #d4a43a; }
        .sync-status.error { color: #c23b3b; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ Управление персонажами (Bellwright)</h1>
    <div class="subtitle">Боевые + Рабочие характеристики | Полная синхронизация через Airtable</div>

    <div class="toolbar">
        <div>
            <button class="btn btn-primary" id="exportBtn">📥 Экспорт (CSV)</button>
            <button class="btn" id="importBtn">📂 Импорт CSV</button>
            <input type="file" id="importFile" accept=".csv" style="display: none;">
            <button class="btn" id="syncNowBtn">🔄 Синхронизировать</button>
        </div>
        <div>
            <button class="btn btn-warning" id="resetDemoBtn">🎮 Сброс к демо</button>
            <button class="btn" id="clearAllFiltersBtn">🧹 Очистить фильтры</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusMessage">📡 Подключение к Airtable...</span>
        <span id="syncStatus" class="sync-status">⚙️</span>
    </div>

    <div class="filter-bar">
        <div class="filter-title">🔍 Быстрый фильтр</div>
        <div class="filter-controls" id="filterControls"></div>
        <div class="filter-buttons">
            <button class="btn" id="applyFiltersBtn">Применить фильтры</button>
            <button class="btn" id="resetFiltersBtn">Сбросить фильтры</button>
        </div>
    </div>

    <div class="count-info" id="countInfo"></div>
    <div class="table-wrapper" id="tableWrapper"></div>
    <button class="add-row" id="addRowBtn">+ Добавить нового персонажа</button>
</div>

<script>
    // ========== НАСТРОЙКИ AIRTABLE (ВАШИ ДАННЫЕ) ==========
    // Эти данные видны только в исходном коде. Пользователи видят только готовую страницу.
    const AIRTABLE_TOKEN = "patgpOhBn6qUXAi6c.34109e4d9347196a93184b1fb1e715690d5a6b928bdc5e286a437da8fbb9a1a7";
    const AIRTABLE_BASE_ID = "apppJkdRTfpV08cEZ";   
    const AIRTABLE_TABLE_NAME = "Table 1";           
    
    // ========== ВСЕ КОЛОНКИ (16 ШТУК) ==========
    const COLUMNS = [
        "№", "Прозвище", "Сила", "Ловкость", 
        "Одноручное оружие", "Двуручное оружие", "Древковое оружие", "Щиты", "Стрельба из лука",
        "Сбор", "Земледелие", "Скотоводство", "Приготовление пищи", "Изготовление", "Исследует", "Рабочий"
    ];

    let characters = [];
    let airtableRecords = {};
    let filteredIndices = [];
    let isSaving = false;

    // ========== ДЕМО-ДАННЫЕ ==========
    function getDefaultCharacters() {
        return [
            { "№": 1, "Прозвище": "Иван", "Сила": "2/5", "Ловкость": "3/4", "Одноручное оружие": "3/5", "Двуручное оружие": "2/4", "Древковое оружие": "3/4", "Щиты": "2/5", "Стрельба из лука": "3/5", "Сбор": "2/4", "Земледелие": "3/5", "Скотоводство": "2/4", "Приготовление пищи": "3/4", "Изготовление": "2/5", "Исследует": "Алхимия", "Рабочий": "Да" },
            { "№": 2, "Прозвище": "Ольга", "Сила": "3/5", "Ловкость": "4/5", "Одноручное оружие": "4/5", "Двуручное оружие": "3/4", "Древковое оружие": "4/5", "Щиты": "3/5", "Стрельба из лука": "5/6", "Сбор": "4/5", "Земледелие": "3/4", "Скотоводство": "4/5", "Приготовление пищи": "4/5", "Изготовление": "3/5", "Исследует": "Травничество", "Рабочий": "Да" },
            { "№": 3, "Прозвище": "Пётр", "Сила": "4/5", "Ловкость": "2/4", "Одноручное оружие": "4/5", "Двуручное оружие": "4/5", "Древковое оружие": "3/5", "Щиты": "4/5", "Стрельба из лука": "2/5", "Сбор": "2/4", "Земледелие": "2/5", "Скотоводство": "3/5", "Приготовление пищи": "2/4", "Изготовление": "4/5", "Исследует": "Кузнечество", "Рабочий": "Нет" }
        ];
    }

    // ========== РАБОТА С AIRTABLE ==========
    async function loadFromAirtable() {
        updateStatus("📡 Загрузка из Airtable...", "syncing");
        
        try {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}?sort[0][field]=№&sort[0][direction]=asc`;
            const response = await fetch(url, {
                headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` }
            });
            
            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Ошибка ${response.status}: ${errorText}`);
            }
            
            const data = await response.json();
            characters = [];
            airtableRecords = {};
            
            for (const record of data.records) {
                const fields = record.fields;
                const char = {};
                COLUMNS.forEach(col => {
                    char[col] = fields[col] !== undefined ? String(fields[col]) : "";
                });
                characters.push(char);
                airtableRecords[char["№"]] = record.id;
            }
            
            if (characters.length === 0) {
                characters = getDefaultCharacters();
                renumberRows();
                await syncAllToAirtable();
            }
            
            renumberRows();
            updateStatus(`✅ Загружено ${characters.length} персонажей`, "synced");
            return true;
            
        } catch (error) {
            console.error(error);
            updateStatus(`⚠️ Ошибка: ${error.message}`, "error");
            return false;
        }
    }
    
    async function saveToAirtable(character) {
        if (isSaving || !AIRTABLE_TOKEN) return;
        
        const recordId = airtableRecords[character["№"]];
        const fields = {};
        COLUMNS.forEach(col => {
            if (character[col] !== undefined && character[col] !== "") {
                fields[col] = character[col];
            }
        });
        
        try {
            if (recordId) {
                await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                    method: "PATCH",
                    headers: {
                        "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ fields })
                });
            } else {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${AIRTABLE_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ fields })
                });
                const data = await response.json();
                airtableRecords[character["№"]] = data.id;
            }
        } catch (error) {
            console.error("Ошибка сохранения:", error);
        }
    }
    
    async function deleteFromAirtable(character) {
        const recordId = airtableRecords[character["№"]];
        if (!recordId) return;
        
        try {
            await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` }
            });
            delete airtableRecords[character["№"]];
        } catch (error) {
            console.error("Ошибка удаления:", error);
        }
    }
    
    async function syncAllToAirtable() {
        if (isSaving) return;
        isSaving = true;
        updateStatus("💾 Синхронизация...", "syncing");
        
        for (const char of characters) {
            await saveToAirtable(char);
        }
        
        updateStatus("✅ Синхронизация завершена", "synced");
        isSaving = false;
    }

    // ========== ОСНОВНЫЕ ФУНКЦИИ ==========
    function renumberRows() {
        characters.forEach((ch, idx) => { ch["№"] = idx + 1; });
    }

    function updateStatus(message, type) {
        const statusEl = document.getElementById("statusMessage");
        const syncStatusEl = document.getElementById("syncStatus");
        if (statusEl) statusEl.innerHTML = message;
        if (syncStatusEl) {
            syncStatusEl.className = `sync-status ${type}`;
            syncStatusEl.innerHTML = type === "synced" ? "✅" : (type === "syncing" ? "🔄" : "⚠️");
        }
    }

    function escapeHtml(str) {
        if (!str) return "";
        return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }

    function buildFilterControls() {
        const container = document.getElementById("filterControls");
        if (!container) return;
        container.innerHTML = "";
        const importantCols = ["Прозвище", "Сила", "Ловкость", "Одноручное оружие", "Рабочий", "Исследует"];
        importantCols.forEach(col => {
            let uniqueVals = [...new Set(characters.map(ch => ch[col]?.toString() || ""))].filter(v => v !== "");
            uniqueVals.sort();
            const div = document.createElement("div");
            div.className = "filter-item";
            div.innerHTML = `
                <label>${col}</label>
                <select class="filter-select" data-col="${col}">
                    <option value="">Все</option>
                    ${uniqueVals.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')}
                </select>
            `;
            container.appendChild(div);
        });
        const searchDiv = document.createElement("div");
        searchDiv.className = "filter-item";
        searchDiv.innerHTML = `<label>🔎 Поиск по всем</label><input type="text" id="globalSearch" placeholder="Введите текст...">`;
        container.appendChild(searchDiv);
    }

    function readFiltersFromUI() {
        let newFilters = {};
        document.querySelectorAll('.filter-select').forEach(sel => {
            const col = sel.getAttribute('data-col');
            const val = sel.value;
            if (val && val !== "") newFilters[col] = val;
        });
        const globalSearch = document.getElementById("globalSearch")?.value.toLowerCase();
        if (globalSearch && globalSearch !== "") newFilters["__global__"] = globalSearch;
        return newFilters;
    }

    function applyFilters() {
        const uiFilters = readFiltersFromUI();
        const globalTerm = uiFilters["__global__"];
        delete uiFilters["__global__"];
        
        filteredIndices = [];
        for (let i = 0; i < characters.length; i++) {
            let match = true;
            for (let col in uiFilters) {
                let filterVal = uiFilters[col];
                let cellVal = characters[i][col]?.toString() || "";
                if (cellVal !== filterVal) { match = false; break; }
            }
            if (match && globalTerm) {
                let found = false;
                for (let col of COLUMNS) {
                    let val = characters[i][col]?.toString().toLowerCase() || "";
                    if (val.includes(globalTerm)) { found = true; break; }
                }
                if (!found) match = false;
            }
            if (match) filteredIndices.push(i);
        }
        renderTable();
    }

    function renderTable() {
        const wrapper = document.getElementById("tableWrapper");
        if (!wrapper) return;
        
        let html = `<table><thead><tr>`;
        COLUMNS.forEach(col => {
            html += `<th onclick="sortByColumn('${col}')">${escapeHtml(col)}</th>`;
        });
        html += `<th>🗑️</th></tr></thead><tbody>`;
        
        if (filteredIndices.length === 0) {
            html += `<table><td colspan="${COLUMNS.length+1}" style="text-align:center;">😔 Нет персонажей, соответствующих фильтрам</td></tr>`;
        } else {
            for (let idx of filteredIndices) {
                let ch = characters[idx];
                html += `<tr data-rowidx="${idx}">`;
                COLUMNS.forEach(col => {
                    let value = ch[col] !== undefined && ch[col] !== null ? ch[col] : "";
                    html += `<td><input type="text" class="editable" value="${escapeHtml(value)}" data-col="${col}" data-rowidx="${idx}">`;
                });
                html += `<td><button class="delete-row" data-rowidx="${idx}">❌</button></td>`;
                html += `</tr>`;
            }
        }
 
        wrapper.innerHTML = html;
        
        document.getElementById("countInfo").innerHTML = `📊 Показано: ${filteredIndices.length} из ${characters.length} персонажей`;

        document.querySelectorAll('.editable').forEach(inp => {
            inp.removeEventListener('change', handleEdit);
            inp.addEventListener('change', handleEdit);
        });
        document.querySelectorAll('.delete-row').forEach(btn => {
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }

    async function handleEdit(e) {
        const rowIdx = parseInt(this.getAttribute('data-rowidx'));
        const colName = this.getAttribute('data-col');
        const newValue = this.value;
        if (!isNaN(rowIdx) && characters[rowIdx]) {
            characters[rowIdx][colName] = newValue;
            renumberRows();
            await saveToAirtable(characters[rowIdx]);
            buildFilterControls();
            applyFilters();
            updateStatus("✏️ Изменения сохранены", "synced");
        }
    }

    async function handleDelete(e) {
        const rowIdx = parseInt(this.getAttribute('data-rowidx'));
        if (confirm(`Удалить персонажа "${characters[rowIdx]?.Прозвище || rowIdx+1}"?`)) {
            const character = characters[rowIdx];
            characters.splice(rowIdx, 1);
            await deleteFromAirtable(character);
            renumberRows();
            await syncAllToAirtable();
            buildFilterControls();
            applyFilters();
            updateStatus("🗑️ Персонаж удалён", "synced");
        }
    }

    async function addNewCharacter() {
        const newChar = {};
        COLUMNS.forEach(col => {
            if (col === "№") {
                newChar[col] = characters.length + 1;
            } else if (col === "Прозвище") {
                newChar[col] = "Новый персонаж";
            } else if (col === "Рабочий") {
                newChar[col] = "Нет";
            } else if (col === "Исследует") {
                newChar[col] = "Ничего";
            } else {
                newChar[col] = "1/1";
            }
        });
        characters.push(newChar);
        renumberRows();
        await saveToAirtable(newChar);
        buildFilterControls();
        applyFilters();
        updateStatus("✨ Новый персонаж добавлен", "synced");
    }

    function resetFiltersUI() {
        document.querySelectorAll('.filter-select').forEach(sel => sel.value = "");
        const globalInput = document.getElementById("globalSearch");
        if (globalInput) globalInput.value = "";
        applyFilters();
    }

    async function resetToDemo() {
        if (confirm("Сбросить к демо-данным? Все текущие персонажи будут удалены из Airtable!")) {
            characters = getDefaultCharacters();
            renumberRows();
            airtableRecords = {};
            await syncAllToAirtable();
            buildFilterControls();
            resetFiltersUI();
            updateStatus("🎮 Сброшено к демо-данным", "synced");
        }
    }

    function exportToCSV() {
        let csvRows = [COLUMNS.join(",")];
        for (let ch of characters) {
            let row = COLUMNS.map(col => {
                let val = ch[col]?.toString() || "";
                if (val.includes(",") || val.includes('"')) {
                    val = `"${val.replace(/"/g, '""')}"`;
                }
                return val;
            }).join(",");
            csvRows.push(row);
        }
        const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "characters.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function importCSV(file) {
        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const rows = text.split(/\r?\n/);
            if (rows.length < 2) {
                alert("Файл пустой или некорректный");
                return;
            }
            const headers = rows[0].split(",").map(h => h.replace(/^"|"$/g, '').trim());
            const newChars = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const values = [];
                let inQuote = false;
                let current = "";
                for (let ch of rows[i]) {
                    if (ch === '"') {
                        inQuote = !inQuote;
                    } else if (ch === ',' && !inQuote) {
                        values.push(current);
                        current = "";
                    } else {
                        current += ch;
                    }
                }
                values.push(current);
                const cleanedValues = values.map(v => v.replace(/^"|"$/g, '').trim());
                let obj = {};
                headers.forEach((h, idx) => { obj[h] = cleanedValues[idx] || ""; });
                if (Object.keys(obj).length > 0) newChars.push(obj);
            }
            if (newChars.length) {
                characters = newChars;
                renumberRows();
                airtableRecords = {};
                await syncAllToAirtable();
                buildFilterControls();
                applyFilters();
                alert(`Импортировано ${characters.length} персонажей`);
            } else {
                alert("Не удалось распознать данные");
            }
        };
        reader.readAsText(file, "UTF-8");
    }

    window.sortByColumn = function(col) {
        characters.sort((a,b) => {
            let valA = a[col]?.toString() || "";
            let valB = b[col]?.toString() || "";
            return valA.localeCompare(valB, undefined, { numeric: true });
        });
        renumberRows();
        syncAllToAirtable();
        applyFilters();
    };

    async function syncFromAirtable() {
        await loadFromAirtable();
        buildFilterControls();
        applyFilters();
    }

    // ========== ЗАПУСК ==========
    document.getElementById("applyFiltersBtn")?.addEventListener("click", () => applyFilters());
    document.getElementById("resetFiltersBtn")?.addEventListener("click", () => resetFiltersUI());
    document.getElementById("clearAllFiltersBtn")?.addEventListener("click", () => resetFiltersUI());
    document.getElementById("addRowBtn")?.addEventListener("click", () => addNewCharacter());
    document.getElementById("exportBtn")?.addEventListener("click", () => exportToCSV());
    document.getElementById("importBtn")?.addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile")?.addEventListener("change", (e) => { if(e.target.files[0]) importCSV(e.target.files[0]); });
    document.getElementById("resetDemoBtn")?.addEventListener("click", () => resetToDemo());
    document.getElementById("syncNowBtn")?.addEventListener("click", () => syncFromAirtable());

    async function init() {
        await loadFromAirtable();
        buildFilterControls();
        applyFilters();
        setInterval(() => syncFromAirtable(), 30000);
    }
    init();
</script>
</body>
</html>
