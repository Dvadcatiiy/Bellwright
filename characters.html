<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bellwright | Управление персонажами</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.26.0/dist/tabler-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
            user-select: text;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #050a05 0%, #0a1508 50%, #050a05 100%);
            margin: 0;
            padding: 20px;
            color: #e8f0dc;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a1508;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #2a4a1a, #4a7a2e);
            border-radius: 10px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(5, 15, 5, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 28px;
            border: 1px solid rgba(70, 120, 40, 0.4);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .container:hover {
            border-color: rgba(100, 150, 50, 0.5);
            box-shadow: 0 12px 40px rgba(30, 80, 20, 0.2);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            color: #8ab860;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .back-link i {
            font-size: 1.2rem;
        }

        .back-link:hover {
            color: #c9ae5c;
            transform: translateX(-4px);
            text-shadow: 0 0 8px rgba(100, 150, 50, 0.3);
        }

        h1 {
            background: linear-gradient(135deg, #f0f5e8, #c9ae5c, #6b8c42, #2a5a1a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 i {
            font-size: 2rem;
            color: #8ab860;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        .subtitle {
            color: #b8d4a0;
            margin-bottom: 24px;
            font-size: 0.9rem;
            border-left: 3px solid #6b8c42;
            padding-left: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .subtitle i {
            font-size: 1rem;
            color: #8ab860;
        }

        .toolbar {
            background: rgba(8, 20, 8, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(70, 120, 40, 0.35);
        }

        .btn {
            background: #1a2a0a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: #e8f0dc;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn i {
            font-size: 1.1rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2a4a1a, #1a2a0a);
            border: 1px solid rgba(100, 150, 50, 0.5);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3a6a28, #2a4a1a);
            box-shadow: 0 6px 20px rgba(30, 80, 20, 0.4);
            border-color: #8ab860;
        }

        .btn-danger {
            background: #5a2a3a;
            border: 1px solid rgba(120, 60, 80, 0.3);
        }

        .btn-danger:hover {
            background: #7a3a50;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(120, 60, 80, 0.3);
            border-color: #a06080;
        }

        .btn-warning {
            background: #5a4a1a;
            border: 1px solid rgba(120, 100, 40, 0.3);
        }

        .btn-warning:hover {
            background: #7a642a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(120, 100, 40, 0.3);
            border-color: #b09850;
        }

        .btn-success {
            background: #1a4a2a;
            border: 1px solid rgba(50, 100, 50, 0.3);
        }

        .btn-success:hover {
            background: #2a6a3a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(50, 120, 50, 0.3);
            border-color: #4a8a5a;
        }

        .btn-sm {
            padding: 4px 14px;
            font-size: 12px;
        }

        .filter-bar {
            background: rgba(8, 20, 8, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(70, 120, 40, 0.35);
        }

        .filter-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #c9ae5c;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Cinema', 'Georgia', 'Times New Roman', serif;
            letter-spacing: 1px;
            font-size: 1.1rem;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 10px;
            background: rgba(5, 15, 5, 0.6);
            padding: 10px;
            border-radius: 16px;
        }

        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-item label {
            font-size: 11px;
            color: #b8d4a0;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-item select,
        .filter-item input {
            background: #0a1a08;
            border: 1px solid #3a5a2a;
            padding: 6px 12px;
            border-radius: 12px;
            color: #e8f0dc;
            min-width: 120px;
            transition: all 0.3s ease;
        }

        .filter-item select:focus,
        .filter-item input:focus {
            outline: none;
            border-color: #8ab860;
            box-shadow: 0 0 0 2px rgba(100, 150, 50, 0.3);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .table-wrapper {
            background: rgba(5, 15, 5, 0.5);
            border-radius: 20px;
            overflow-x: auto;
            padding: 5px;
            transition: all 0.3s ease;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1200px;
        }

        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(70, 120, 40, 0.25);
            vertical-align: middle;
        }

        th {
            background: rgba(5, 15, 5, 0.8);
            color: #c9ae5c;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        th:hover {
            background: rgba(15, 30, 12, 0.9);
            color: #e8d5a3;
        }

        td {
            background: rgba(8, 20, 8, 0.4);
        }

        input.editable {
            background: #0a1a08;
            border: 1px solid #3a5a2a;
            color: #e8f0dc;
            padding: 6px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        input.editable:focus {
            outline: none;
            border-color: #8ab860;
            box-shadow: 0 0 0 2px rgba(100, 150, 50, 0.3);
        }

        .delete-row {
            background: #5a2a3a;
            border: none;
            color: #f0d5e0;
            border-radius: 20px;
            cursor: pointer;
            padding: 4px 12px;
            font-size: 11px;
            transition: all 0.3s ease;
        }

        .delete-row:hover {
            background: #8a3a5a;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(120, 60, 80, 0.4);
        }

        .add-row {
            margin-top: 15px;
            background: linear-gradient(135deg, #2a4a1a, #1a2a0a);
            border: 1px solid rgba(100, 150, 50, 0.5);
            padding: 12px;
            border-radius: 40px;
            color: #e8f0dc;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .add-row:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3a6a28, #2a4a1a);
            box-shadow: 0 6px 20px rgba(30, 80, 20, 0.4);
            border-color: #8ab860;
        }

        .count-info {
            margin: 15px 0 10px;
            color: #b8d4a0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-bar {
            background: rgba(8, 20, 8, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #b8d4a0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(70, 120, 40, 0.3);
        }

        .sync-status {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .sync-status.synced { color: #8ab860; }
        .sync-status.syncing { color: #c9ae5c; animation: pulse 1s infinite; }
        .sync-status.error { color: #c97a5a; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .remove-filter {
            background: #5a2a3a;
            border: none;
            color: #f0d5e0;
            border-radius: 20px;
            cursor: pointer;
            padding: 6px 14px;
            font-size: 12px;
            align-self: flex-end;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .remove-filter:hover {
            background: #8a3a5a;
            transform: scale(1.02);
        }

        .filter-group {
            background: rgba(5, 15, 5, 0.6);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 16px; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            h1 { font-size: 1.4rem; }
            h1 i { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">
        <i class="ti ti-arrow-left"></i>
        Вернуться на главную
    </a>
    <h1>
        <i class="ti ti-brand-powers"></i>
        Управление персонажами | Bellwright
    </h1>
    <div class="subtitle">
        <i class="ti ti-plant-2"></i>
        Боевые + Рабочие характеристики | Продвинутая фильтрация | Эльфийское издание
    </div>

    <div class="toolbar">
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-primary" id="exportBtn"><i class="ti ti-download"></i> Экспорт (CSV)</button>
            <button class="btn btn-primary" id="importBtn"><i class="ti ti-upload"></i> Импорт CSV</button>
            <input type="file" id="importFile" accept=".csv" style="display: none;">
            <button class="btn btn-primary" id="syncNowBtn"><i class="ti ti-refresh"></i> Синхронизировать</button>
        </div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap;">
            <button class="btn btn-warning" id="resetDemoBtn"><i class="ti ti-reload"></i> Сброс к демо</button>
            <button class="btn btn-warning" id="clearAllFiltersBtn"><i class="ti ti-filter-off"></i> Очистить фильтры</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusMessage"><i class="ti ti-cloud-data-connection"></i> Подключение к Airtable...</span>
        <span id="syncStatus" class="sync-status"><i class="ti ti-loader"></i> Синхронизация</span>
    </div>

    <div class="filter-bar">
        <div class="filter-title"><i class="ti ti-filter"></i> Фильтр</div>
        <div id="filtersContainer"></div>
        <div class="filter-buttons">
            <button class="btn btn-success btn-sm" id="addFilterBtn"><i class="ti ti-plus"></i> Добавить условие</button>
            <button class="btn btn-primary btn-sm" id="applyFiltersBtn"><i class="ti ti-check"></i> Применить фильтры</button>
            <button class="btn btn-warning btn-sm" id="resetFiltersBtn"><i class="ti ti-x"></i> Сбросить фильтры</button>
        </div>
    </div>

    <div class="count-info" id="countInfo"><i class="ti ti-users"></i> <span>Загрузка...</span></div>
    <div class="table-wrapper" id="tableWrapper"></div>
    <button class="add-row" id="addRowBtn"><i class="ti ti-plus"></i> Добавить нового персонажа</button>
</div>

<script>
    const AIRTABLE_TOKEN = "patgpOhBn6qUXAi6c.34109e4d9347196a93184b1fb1e715690d5a6b928bdc5e286a437da8fbb9a1a7";
    const AIRTABLE_BASE_ID = "apppJkdRTfpV08cEZ";
    const AIRTABLE_TABLE_NAME = "Table 1";

    const COLUMNS = [
        "№", "Прозвище", "Сила", "Ловкость",
        "Одноручное оружие", "Двуручное оружие", "Древковое оружие", "Щиты", "Стрельба из лука",
        "Сбор", "Земледелие", "Скотоводство", "Приготовление пищи", "Изготовление", "Исследует", "Рабочий"
    ];

    const NUMERIC_COLUMNS = [
        "Сила", "Ловкость", "Одноручное оружие", "Двуручное оружие", "Древковое оружие",
        "Щиты", "Стрельба из лука", "Сбор", "Земледелие", "Скотоводство",
        "Приготовление пищи", "Изготовление"
    ];

    let characters = [];
    let airtableRecords = {};
    let filteredIndices = [];
    let isSaving = false;
    let filterConditions = [];

    function fractionToNumber(value) {
        if (!value || typeof value !== 'string') return NaN;
        const parts = value.split('/');
        if (parts.length === 2) {
            const num = parseFloat(parts[0]);
            const den = parseFloat(parts[1]);
            if (!isNaN(num) && !isNaN(den) && den !== 0) return num / den;
        }
        return parseFloat(value);
    }

    function checkCondition(value, condition, filterValue) {
        if (value === undefined || value === null || value === "") return false;
        if (NUMERIC_COLUMNS.includes(condition.column)) {
            const numValue = fractionToNumber(value);
            const numFilter = fractionToNumber(filterValue);
            if (isNaN(numValue) || isNaN(numFilter)) return false;
            switch (condition.operator) {
                case '>': return numValue > numFilter;
                case '<': return numValue < numFilter;
                case '>=': return numValue >= numFilter;
                case '<=': return numValue <= numFilter;
                case '=': return numValue === numFilter;
                case '≠': return numValue !== numFilter;
                default: return false;
            }
        } else {
            const strValue = String(value).toLowerCase();
            const strFilter = String(filterValue).toLowerCase();
            switch (condition.operator) {
                case '=': return strValue === strFilter;
                case '≠': return strValue !== strFilter;
                case 'contains': return strValue.includes(strFilter);
                default: return false;
            }
        }
    }

    function applyFilters() {
        if (filterConditions.length === 0) {
            filteredIndices = characters.map((_, idx) => idx);
        } else {
            filteredIndices = [];
            for (let i = 0; i < characters.length; i++) {
                let match = true;
                for (const condition of filterConditions) {
                    if (!condition.column || !condition.operator || !condition.value) continue;
                    const cellValue = characters[i][condition.column];
                    if (!checkCondition(cellValue, condition, condition.value)) {
                        match = false;
                        break;
                    }
                }
                if (match) filteredIndices.push(i);
            }
        }
        renderTable();
    }

    function renderTable() {
        const wrapper = document.getElementById("tableWrapper");
        if (!wrapper) return;

        let html = `<table><thead><tr>`;
        COLUMNS.forEach(col => {
            html += `<th onclick="sortByColumn('${col}')">${escapeHtml(col)}</th>`;
        });
        html += `<th>🗑️</th></tr></thead><tbody>`;

        if (filteredIndices.length === 0) {
            html += `<tr><td colspan="${COLUMNS.length+1}" style="text-align:center;"><i class="ti ti-sparkles"></i> Нет персонажей, соответствующих фильтрам</td></tr>`;
        } else {
            for (let idx of filteredIndices) {
                let ch = characters[idx];
                html += `<tr data-rowidx="${idx}">`;
                COLUMNS.forEach(col => {
                    let value = ch[col] !== undefined && ch[col] !== null ? ch[col] : "";
                    html += `<td><input type="text" class="editable" value="${escapeHtml(value)}" data-col="${col}" data-rowidx="${idx}">`;
                });
                html += `<td><button class="delete-row" data-rowidx="${idx}"><i class="ti ti-trash"></i></button></td>`;
                html += `</tr>`;
            }
        }
        html += `</tbody><table>`;
        wrapper.innerHTML = html;

        document.getElementById("countInfo").innerHTML = `<i class="ti ti-users"></i> <span>📊 Показано: ${filteredIndices.length} из ${characters.length} персонажей</span>`;

        document.querySelectorAll('.editable').forEach(inp => {
            inp.removeEventListener('change', handleEdit);
            inp.addEventListener('change', handleEdit);
        });
        document.querySelectorAll('.delete-row').forEach(btn => {
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }

    function buildFiltersUI() {
        const container = document.getElementById("filtersContainer");
        if (!container) return;
        if (filterConditions.length === 0) {
            container.innerHTML = '<div style="color: #b8d4a0; padding: 10px;"><i class="ti ti-sparkles"></i> Нет активных фильтров. Нажмите "+ Добавить условие"</div>';
            return;
        }
        container.innerHTML = "";
        filterConditions.forEach((condition, index) => {
            const filterDiv = document.createElement("div");
            filterDiv.className = "filter-group";
            filterDiv.innerHTML = `
                <div class="filter-row">
                    <div class="filter-item">
                        <label><i class="ti ti-columns"></i> Параметр</label>
                        <select class="filter-column" data-index="${index}">
                            ${COLUMNS.map(col => `<option value="${col}" ${condition.column === col ? 'selected' : ''}>${col}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-item">
                        <label><i class="ti ti-arrows-sort"></i> Условие</label>
                        <select class="filter-operator" data-index="${index}">
                            <option value=">" ${condition.operator === '>' ? 'selected' : ''}>больше (>)</option>
                            <option value=">=" ${condition.operator === '>=' ? 'selected' : ''}>больше или равно (≥)</option>
                            <option value="<" ${condition.operator === '<' ? 'selected' : ''}>меньше (<)</option>
                            <option value="<=" ${condition.operator === '<=' ? 'selected' : ''}>меньше или равно (≤)</option>
                            <option value="=" ${condition.operator === '=' ? 'selected' : ''}>равно (=)</option>
                            <option value="≠" ${condition.operator === '≠' ? 'selected' : ''}>не равно (≠)</option>
                            <option value="contains" ${condition.operator === 'contains' ? 'selected' : ''}>содержит (текст)</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label><i class="ti ti-numbers"></i> Значение</label>
                        <input type="text" class="filter-value" value="${escapeHtml(condition.value || '')}" data-index="${index}" placeholder="например: 2/4 или 0.5">
                    </div>
                    <button class="remove-filter" data-index="${index}"><i class="ti ti-trash"></i> Удалить</button>
                </div>
            `;
            container.appendChild(filterDiv);
        });
        document.querySelectorAll('.filter-column').forEach(select => {
            select.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].column = e.target.value;
            });
        });
        document.querySelectorAll('.filter-operator').forEach(select => {
            select.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].operator = e.target.value;
            });
        });
        document.querySelectorAll('.filter-value').forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].value = e.target.value;
            });
        });
        document.querySelectorAll('.remove-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                filterConditions.splice(idx, 1);
                buildFiltersUI();
                applyFilters();
            });
        });
    }

    function addFilterCondition() { filterConditions.push({ column: "Сила", operator: ">", value: "" }); buildFiltersUI(); }
    function resetAllFilters() { filterConditions = []; buildFiltersUI(); applyFilters(); }

    function getDefaultCharacters() {

    async function loadFromAirtable() {
        updateStatus("Загрузка из Airtable...", "syncing");
        try {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}?sort[0][field]=№&sort[0][direction]=asc`;
            const response = await fetch(url, { headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` } });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            const data = await response.json();
            characters = [];
            airtableRecords = {};
            for (const record of data.records) {
                const fields = record.fields;
                const char = {};
                COLUMNS.forEach(col => { char[col] = fields[col] !== undefined ? String(fields[col]) : ""; });
                characters.push(char);
                airtableRecords[char["№"]] = record.id;
            }
            if (characters.length === 0) {
                characters = getDefaultCharacters();
                renumberRows();
                await syncAllToAirtable();
            }
            renumberRows();
            updateStatus(`✅ Загружено ${characters.length} персонажей`, "synced");
            return true;
        } catch (error) {
            updateStatus(`⚠️ Ошибка: ${error.message}`, "error");
            return false;
        }
    }

    async function saveToAirtable(character) {
        if (isSaving) return;
        const recordId = airtableRecords[character["№"]];
        const fields = {};
        COLUMNS.forEach(col => { if (character[col] !== undefined && character[col] !== "") fields[col] = character[col]; });
        try {
            if (recordId) {
                await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                    method: "PATCH",
                    headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ fields })
                });
            } else {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ fields })
                });
                const data = await response.json();
                airtableRecords[character["№"]] = data.id;
            }
        } catch (error) { console.error(error); }
    }

    async function deleteFromAirtable(character) {
        const recordId = airtableRecords[character["№"]];
        if (!recordId) return;
        try {
            await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` }
            });
            delete airtableRecords[character["№"]];
        } catch (error) { console.error(error); }
    }

    async function syncAllToAirtable() {
        if (isSaving) return;
        isSaving = true;
        updateStatus("Синхронизация...", "syncing");
        for (const char of characters) await saveToAirtable(char);
        updateStatus("✅ Синхронизация завершена", "synced");
        isSaving = false;
    }

    function renumberRows() { characters.forEach((ch, idx) => { ch["№"] = idx + 1; }); }
    function updateStatus(message, type) {
        const statusEl = document.getElementById("statusMessage");
        const syncStatusEl = document.getElementById("syncStatus");
        if (statusEl) statusEl.innerHTML = `<i class="ti ti-cloud-data-connection"></i> ${message}`;
        if (syncStatusEl) {
            syncStatusEl.className = `sync-status ${type}`;
            if (type === "synced") syncStatusEl.innerHTML = '<i class="ti ti-check"></i> Синхронизировано';
            else if (type === "syncing") syncStatusEl.innerHTML = '<i class="ti ti-loader"></i> Синхронизация...';
            else syncStatusEl.innerHTML = '<i class="ti ti-alert-triangle"></i> Ошибка';
        }
    }
