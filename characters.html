<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellwright - Персонажи</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: text;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #050a05 0%, #0a1508 50%, #050a05 100%);
            margin: 0;
            padding: 20px;
            color: #e8f0dc;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a0a2e;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 10px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(15, 35, 15, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(100, 150, 50, 0.3);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #a855f7;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .back-link:hover {
            color: #c084fc;
            transform: translateX(-4px);
            text-shadow: 0 0 8px rgba(192, 132, 252, 0.5);
        }
        h1 {
            background: linear-gradient(135deg, #e8d5a3, #c9ae5c, #6b8c42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }
        .subtitle {
            color: #b4a4d0;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .toolbar {
            background: rgba(40, 25, 65, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(156, 82, 255, 0.3);
        }
        .btn {
            background: #2a1a4a;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5), 0 0 10px rgba(192, 132, 252, 0.3);
        }
        .btn-danger {
            background: #7c2d4a;
        }
        .btn-danger:hover {
            background: #9a3d62;
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(156, 82, 255, 0.3);
        }
        .btn-warning {
            background: #7a5a2c;
        }
        .btn-warning:hover {
            background: #9a743a;
            transform: translateY(-2px);
        }
        .btn-success {
            background: #2c5a3a;
        }
        .btn-success:hover {
            background: #3a7a4a;
            transform: translateY(-2px);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.3);
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 12px;
        }
        .filter-bar {
            background: rgba(40, 25, 65, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(156, 82, 255, 0.3);
        }
        .filter-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #c084fc;
        }
        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: flex-end;
            margin-bottom: 10px;
            background: rgba(30, 20, 50, 0.8);
            padding: 10px;
            border-radius: 16px;
        }
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .filter-item label {
            font-size: 11px;
            color: #b4a4d0;
        }
        .filter-item select, .filter-item input {
            background: #1a0a2e;
            border: 1px solid #5a3a8a;
            padding: 6px 12px;
            border-radius: 12px;
            color: white;
            min-width: 120px;
            transition: all 0.3s ease;
        }
        .filter-item select:focus, .filter-item input:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .table-wrapper {
            background: rgba(20, 15, 35, 0.5);
            border-radius: 20px;
            overflow-x: auto;
            padding: 5px;
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 1200px;
        }
        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid rgba(156, 82, 255, 0.2);
            vertical-align: middle;
        }
        th {
            background: rgba(30, 20, 50, 0.8);
            color: #c084fc;
            font-weight: 600;
            position: sticky;
            top: 0;
            cursor: pointer;
            user-select: none;
        }
        th:hover {
            background: rgba(50, 35, 80, 0.9);
            color: #e9d5ff;
        }
        td {
            background: rgba(25, 18, 45, 0.5);
        }
        input.editable {
            background: #1a0a2e;
            border: 1px solid #5a3a8a;
            color: white;
            padding: 6px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            transition: all 0.3s ease;
        }
        input.editable:focus {
            outline: none;
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }
        .delete-row {
            background: #7c2d4a;
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            padding: 4px 12px;
            font-size: 11px;
            transition: all 0.3s ease;
        }
        .delete-row:hover {
            background: #9a3d62;
            transform: scale(1.05);
            box-shadow: 0 0 8px rgba(156, 82, 255, 0.4);
        }
        .add-row {
            margin-top: 15px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(124, 58, 237, 0.3);
        }
        .add-row:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(124, 58, 237, 0.5), 0 0 15px rgba(192, 132, 252, 0.3);
        }
        .count-info {
            margin: 15px 0 10px;
            color: #b4a4d0;
        }
        .status-bar {
            background: rgba(40, 25, 65, 0.6);
            backdrop-filter: blur(8px);
            padding: 8px 15px;
            border-radius: 40px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #b4a4d0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sync-status {
            font-size: 12px;
        }
        .sync-status.synced { color: #a855f7; }
        .sync-status.syncing { color: #c084fc; }
        .sync-status.error { color: #c23b3b; }
        .remove-filter {
            background: #7c2d4a;
            border: none;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            padding: 6px 12px;
            font-size: 12px;
            align-self: flex-end;
            transition: all 0.3s ease;
        }
        .remove-filter:hover {
            background: #9a3d62;
            transform: scale(1.05);
        }
        .filter-group {
            background: rgba(30, 20, 50, 0.8);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <a href="index.html" class="back-link">← Вернуться на главную</a>
    <h1>⚔️ Управление персонажами (Bellwright)</h1>
    <div class="subtitle">Боевые + Рабочие характеристики | Продвинутая фильтрация | Фиолетовое издание 💜</div>

    <div class="toolbar">
        <div>
            <button class="btn btn-primary" id="exportBtn">📥 Экспорт (CSV)</button>
            <button class="btn" id="importBtn">📂 Импорт CSV</button>
            <input type="file" id="importFile" accept=".csv" style="display: none;">
            <button class="btn" id="syncNowBtn">🔄 Синхронизировать</button>
        </div>
        <div>
            <button class="btn btn-warning" id="resetDemoBtn">🎮 Сброс к демо</button>
            <button class="btn" id="clearAllFiltersBtn">🧹 Очистить фильтры</button>
        </div>
    </div>

    <div class="status-bar">
        <span id="statusMessage">📡 Подключение к Airtable...</span>
        <span id="syncStatus" class="sync-status">⚙️</span>
    </div>

    <div class="filter-bar">
        <div class="filter-title">🔍 Продвинутый фильтр (по любым параметрам)</div>
        <div id="filtersContainer"></div>
        <div class="filter-buttons">
            <button class="btn btn-success btn-sm" id="addFilterBtn">+ Добавить условие</button>
            <button class="btn" id="applyFiltersBtn">Применить фильтры</button>
            <button class="btn" id="resetFiltersBtn">Сбросить фильтры</button>
        </div>
    </div>

    <div class="count-info" id="countInfo"></div>
    <div class="table-wrapper" id="tableWrapper"></div>
    <button class="add-row" id="addRowBtn">+ Добавить нового персонажа</button>
</div>

<script>
    const AIRTABLE_TOKEN = "patgpOhBn6qUXAi6c.34109e4d9347196a93184b1fb1e715690d5a6b928bdc5e286a437da8fbb9a1a7";
    const AIRTABLE_BASE_ID = "apppJkdRTfpV08cEZ";
    const AIRTABLE_TABLE_NAME = "Table 1";
    
    const COLUMNS = [
        "№", "Прозвище", "Сила", "Ловкость", 
        "Одноручное оружие", "Двуручное оружие", "Древковое оружие", "Щиты", "Стрельба из лука",
        "Сбор", "Земледелие", "Скотоводство", "Приготовление пищи", "Изготовление", "Исследует", "Рабочий"
    ];

    const NUMERIC_COLUMNS = [
        "Сила", "Ловкость", "Одноручное оружие", "Двуручное оружие", "Древковое оружие", 
        "Щиты", "Стрельба из лука", "Сбор", "Земледелие", "Скотоводство", 
        "Приготовление пищи", "Изготовление"
    ];

    let characters = [];
    let airtableRecords = {};
    let filteredIndices = [];
    let isSaving = false;
    let filterConditions = [];

    function fractionToNumber(value) {
        if (!value || typeof value !== 'string') return NaN;
        const parts = value.split('/');
        if (parts.length === 2) {
            const num = parseFloat(parts[0]);
            const den = parseFloat(parts[1]);
            if (!isNaN(num) && !isNaN(den) && den !== 0) return num / den;
        }
        return parseFloat(value);
    }

    function checkCondition(value, condition, filterValue) {
        if (value === undefined || value === null || value === "") return false;
        
        if (NUMERIC_COLUMNS.includes(condition.column)) {
            const numValue = fractionToNumber(value);
            const numFilter = fractionToNumber(filterValue);
            if (isNaN(numValue) || isNaN(numFilter)) return false;
            switch (condition.operator) {
                case '>': return numValue > numFilter;
                case '<': return numValue < numFilter;
                case '>=': return numValue >= numFilter;
                case '<=': return numValue <= numFilter;
                case '=': return numValue === numFilter;
                case '≠': return numValue !== numFilter;
                default: return false;
            }
        } else {
            const strValue = String(value).toLowerCase();
            const strFilter = String(filterValue).toLowerCase();
            switch (condition.operator) {
                case '=': return strValue === strFilter;
                case '≠': return strValue !== strFilter;
                case 'contains': return strValue.includes(strFilter);
                default: return false;
            }
        }
    }

    function applyFilters() {
        if (filterConditions.length === 0) {
            filteredIndices = characters.map((_, idx) => idx);
        } else {
            filteredIndices = [];
            for (let i = 0; i < characters.length; i++) {
                let match = true;
                for (const condition of filterConditions) {
                    if (!condition.column || !condition.operator || !condition.value) continue;
                    const cellValue = characters[i][condition.column];
                    if (!checkCondition(cellValue, condition, condition.value)) {
                        match = false;
                        break;
                    }
                }
                if (match) filteredIndices.push(i);
            }
        }
        renderTable();
    }

    function renderTable() {
        const wrapper = document.getElementById("tableWrapper");
        if (!wrapper) return;
        
        let html = `<table><thead><tr>`;
        COLUMNS.forEach(col => {
            html += `<th onclick="sortByColumn('${col}')">${escapeHtml(col)}</th>`;
        });
        html += `<th>🗑️</th></tr></thead><tbody>`;
        
        if (filteredIndices.length === 0) {
            html += `<tr><td colspan="${COLUMNS.length+1}" style="text-align:center;">😔 Нет персонажей, соответствующих фильтрам<\/td></tr>`;
        } else {
            for (let idx of filteredIndices) {
                let ch = characters[idx];
                html += `<tr data-rowidx="${idx}">`;
                COLUMNS.forEach(col => {
                    let value = ch[col] !== undefined && ch[col] !== null ? ch[col] : "";
                    html += `<td><input type="text" class="editable" value="${escapeHtml(value)}" data-col="${col}" data-rowidx="${idx}">`;
                });
                html += `<td><button class="delete-row" data-rowidx="${idx}">❌</button></td>`;
                html += `</tr>`;
            }
        }
        html += `</tbody>墨`;
        wrapper.innerHTML = html;
        
        document.getElementById("countInfo").innerHTML = `📊 Показано: ${filteredIndices.length} из ${characters.length} персонажей`;

        document.querySelectorAll('.editable').forEach(inp => {
            inp.removeEventListener('change', handleEdit);
            inp.addEventListener('change', handleEdit);
        });
        document.querySelectorAll('.delete-row').forEach(btn => {
            btn.removeEventListener('click', handleDelete);
            btn.addEventListener('click', handleDelete);
        });
    }

    function buildFiltersUI() {
        const container = document.getElementById("filtersContainer");
        if (!container) return;
        
        if (filterConditions.length === 0) {
            container.innerHTML = '<div style="color: #b4a4d0; padding: 10px;">✨ Нет активных фильтров. Нажмите "+ Добавить условие" ✨</div>';
            return;
        }
        
        container.innerHTML = "";
        
        filterConditions.forEach((condition, index) => {
            const filterDiv = document.createElement("div");
            filterDiv.className = "filter-group";
            
            filterDiv.innerHTML = `
                <div class="filter-row">
                    <div class="filter-item">
                        <label>Параметр</label>
                        <select class="filter-column" data-index="${index}">
                            ${COLUMNS.map(col => `<option value="${col}" ${condition.column === col ? 'selected' : ''}>${col}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Условие</label>
                        <select class="filter-operator" data-index="${index}">
                            <option value=">" ${condition.operator === '>' ? 'selected' : ''}>больше (>)</option>
                            <option value=">=" ${condition.operator === '>=' ? 'selected' : ''}>больше или равно (≥)</option>
                            <option value="<" ${condition.operator === '<' ? 'selected' : ''}>меньше (<)</option>
                            <option value="<=" ${condition.operator === '<=' ? 'selected' : ''}>меньше или равно (≤)</option>
                            <option value="=" ${condition.operator === '=' ? 'selected' : ''}>равно (=)</option>
                            <option value="≠" ${condition.operator === '≠' ? 'selected' : ''}>не равно (≠)</option>
                            <option value="contains" ${condition.operator === 'contains' ? 'selected' : ''}>содержит (текст)</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Значение</label>
                        <input type="text" class="filter-value" value="${escapeHtml(condition.value || '')}" data-index="${index}" placeholder="например: 2/4 или 0.5">
                    </div>
                    <button class="remove-filter btn-danger btn-sm" data-index="${index}">✖ Удалить</button>
                </div>
            `;
            container.appendChild(filterDiv);
        });
        
        document.querySelectorAll('.filter-column').forEach(select => {
            select.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].column = e.target.value;
            });
        });
        
        document.querySelectorAll('.filter-operator').forEach(select => {
            select.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].operator = e.target.value;
            });
        });
        
        document.querySelectorAll('.filter-value').forEach(input => {
            input.addEventListener('change', (e) => {
                const idx = parseInt(e.target.dataset.index);
                filterConditions[idx].value = e.target.value;
            });
        });
        
        document.querySelectorAll('.remove-filter').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                filterConditions.splice(idx, 1);
                buildFiltersUI();
                applyFilters();
            });
        });
    }

    function addFilterCondition() {
        filterConditions.push({
            column: "Сила",
            operator: ">",
            value: ""
        });
        buildFiltersUI();
    }

    function resetAllFilters() {
        filterConditions = [];
        buildFiltersUI();
        applyFilters();
    }

    function getDefaultCharacters() {
        return [
            { "№": 1, "Прозвище": "Иван", "Сила": "2/5", "Ловкость": "3/4", "Одноручное оружие": "3/5", "Двуручное оружие": "2/4", "Древковое оружие": "3/4", "Щиты": "2/5", "Стрельба из лука": "3/5", "Сбор": "2/4", "Земледелие": "3/5", "Скотоводство": "2/4", "Приготовление пищи": "3/4", "Изготовление": "2/5", "Исследует": "Алхимия", "Рабочий": "Да" },
            { "№": 2, "Прозвище": "Ольга", "Сила": "3/5", "Ловкость": "4/5", "Одноручное оружие": "4/5", "Двуручное оружие": "3/4", "Древковое оружие": "4/5", "Щиты": "3/5", "Стрельба из лука": "5/6", "Сбор": "4/5", "Земледелие": "3/4", "Скотоводство": "4/5", "Приготовление пищи": "4/5", "Изготовление": "3/5", "Исследует": "Травничество", "Рабочий": "Да" },
            { "№": 3, "Прозвище": "Пётр", "Сила": "4/5", "Ловкость": "2/4", "Одноручное оружие": "4/5", "Двуручное оружие": "4/5", "Древковое оружие": "3/5", "Щиты": "4/5", "Стрельба из лука": "2/5", "Сбор": "2/4", "Земледелие": "2/5", "Скотоводство": "3/5", "Приготовление пищи": "2/4", "Изготовление": "4/5", "Исследует": "Кузнечество", "Рабочий": "Нет" }
        ];
    }

    async function loadFromAirtable() {
        updateStatus("📡 Загрузка из Airtable...", "syncing");
        try {
            const url = `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}?sort[0][field]=№&sort[0][direction]=asc`;
            const response = await fetch(url, { headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` } });
            if (!response.ok) throw new Error(`Ошибка ${response.status}`);
            const data = await response.json();
            characters = [];
            airtableRecords = {};
            for (const record of data.records) {
                const fields = record.fields;
                const char = {};
                COLUMNS.forEach(col => { char[col] = fields[col] !== undefined ? String(fields[col]) : ""; });
                characters.push(char);
                airtableRecords[char["№"]] = record.id;
            }
            if (characters.length === 0) {
                characters = getDefaultCharacters();
                renumberRows();
                await syncAllToAirtable();
            }
            renumberRows();
            updateStatus(`✅ Загружено ${characters.length} персонажей`, "synced");
            return true;
        } catch (error) {
            updateStatus(`⚠️ Ошибка: ${error.message}`, "error");
            return false;
        }
    }

    async function saveToAirtable(character) {
        if (isSaving) return;
        const recordId = airtableRecords[character["№"]];
        const fields = {};
        COLUMNS.forEach(col => { if (character[col] !== undefined && character[col] !== "") fields[col] = character[col]; });
        try {
            if (recordId) {
                await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                    method: "PATCH",
                    headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ fields })
                });
            } else {
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ fields })
                });
                const data = await response.json();
                airtableRecords[character["№"]] = data.id;
            }
        } catch (error) { console.error("Ошибка сохранения:", error); }
    }

    async function deleteFromAirtable(character) {
        const recordId = airtableRecords[character["№"]];
        if (!recordId) return;
        try {
            await fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE_NAME)}/${recordId}`, {
                method: "DELETE",
                headers: { "Authorization": `Bearer ${AIRTABLE_TOKEN}` }
            });
            delete airtableRecords[character["№"]];
        } catch (error) { console.error("Ошибка удаления:", error); }
    }

    async function syncAllToAirtable() {
        if (isSaving) return;
        isSaving = true;
        updateStatus("💾 Синхронизация...", "syncing");
        for (const char of characters) await saveToAirtable(char);
        updateStatus("✅ Синхронизация завершена", "synced");
        isSaving = false;
    }

    function renumberRows() { characters.forEach((ch, idx) => { ch["№"] = idx + 1; }); }
    function updateStatus(message, type) {
        const statusEl = document.getElementById("statusMessage");
        const syncStatusEl = document.getElementById("syncStatus");
        if (statusEl) statusEl.innerHTML = message;
        if (syncStatusEl) {
            syncStatusEl.className = `sync-status ${type}`;
            syncStatusEl.innerHTML = type === "synced" ? "✅" : (type === "syncing" ? "🔄" : "⚠️");
        }
    }
    function escapeHtml(str) { if (!str) return ""; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;')); }

    async function handleEdit(e) {
        const rowIdx = parseInt(this.getAttribute('data-rowidx'));
        const colName = this.getAttribute('data-col');
        const newValue = this.value;
        if (!isNaN(rowIdx) && characters[rowIdx]) {
            characters[rowIdx][colName] = newValue;
            renumberRows();
            await saveToAirtable(characters[rowIdx]);
            applyFilters();
            updateStatus("✏️ Изменения сохранены", "synced");
        }
    }

    async function handleDelete(e) {
        const rowIdx = parseInt(this.getAttribute('data-rowidx'));
        if (confirm(`Удалить персонажа "${characters[rowIdx]?.Прозвище}"?`)) {
            const character = characters[rowIdx];
            characters.splice(rowIdx, 1);
            await deleteFromAirtable(character);
            renumberRows();
            await syncAllToAirtable();
            applyFilters();
            updateStatus("🗑️ Персонаж удалён", "synced");
        }
    }

    async function addNewCharacter() {
        const newChar = {};
        COLUMNS.forEach(col => {
            if (col === "№") newChar[col] = characters.length + 1;
            else if (col === "Прозвище") newChar[col] = "Новый персонаж";
            else if (col === "Рабочий") newChar[col] = "Нет";
            else if (col === "Исследует") newChar[col] = "Ничего";
            else newChar[col] = "1/1";
        });
        characters.push(newChar);
        renumberRows();
        await saveToAirtable(newChar);
        applyFilters();
        updateStatus("✨ Новый персонаж добавлен", "synced");
    }

    async function resetToDemo() {
        if (confirm("Сбросить к демо-данным? Все текущие персонажи будут удалены из Airtable!")) {
            characters = getDefaultCharacters();
            renumberRows();
            airtableRecords = {};
            await syncAllToAirtable();
            resetAllFilters();
            updateStatus("🎮 Сброшено к демо", "synced");
        }
    }

    function exportToCSV() {
        let csvRows = [COLUMNS.join(",")];
        for (let ch of characters) {
            let row = COLUMNS.map(col => {
                let val = ch[col]?.toString() || "";
                if (val.includes(",") || val.includes('"')) val = `"${val.replace(/"/g, '""')}"`;
                return val;
            }).join(",");
            csvRows.push(row);
        }
        const blob = new Blob(["\uFEFF" + csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute("download", "characters.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    function importCSV(file) {
        const reader = new FileReader();
        reader.onload = async function(e) {
            const text = e.target.result;
            const rows = text.split(/\r?\n/);
            if (rows.length < 2) { alert("Файл пустой"); return; }
            const headers = rows[0].split(",").map(h => h.replace(/^"|"$/g, '').trim());
            const newChars = [];
            for (let i = 1; i < rows.length; i++) {
                if (!rows[i].trim()) continue;
                const values = [];
                let inQuote = false, current = "";
                for (let ch of rows[i]) {
                    if (ch === '"') inQuote = !inQuote;
                    else if (ch === ',' && !inQuote) { values.push(current); current = ""; }
                    else current += ch;
                }
                values.push(current);
                const cleanedValues = values.map(v => v.replace(/^"|"$/g, '').trim());
                let obj = {};
                headers.forEach((h, idx) => { obj[h] = cleanedValues[idx] || ""; });
                if (Object.keys(obj).length > 0) newChars.push(obj);
            }
            if (newChars.length) {
                characters = newChars;
                renumberRows();
                airtableRecords = {};
                await syncAllToAirtable();
                resetAllFilters();
                alert(`Импортировано ${characters.length} персонажей`);
            } else alert("Не удалось распознать данные");
        };
        reader.readAsText(file, "UTF-8");
    }

    window.sortByColumn = function(col) {
        characters.sort((a,b) => {
            let valA = a[col]?.toString() || "";
            let valB = b[col]?.toString() || "";
            return valA.localeCompare(valB, undefined, { numeric: true });
        });
        renumberRows();
        syncAllToAirtable();
        applyFilters();
    };

    async function syncFromAirtable() { await loadFromAirtable(); applyFilters(); }

    document.getElementById("addFilterBtn")?.addEventListener("click", () => addFilterCondition());
    document.getElementById("applyFiltersBtn")?.addEventListener("click", () => applyFilters());
    document.getElementById("resetFiltersBtn")?.addEventListener("click", () => resetAllFilters());
    document.getElementById("clearAllFiltersBtn")?.addEventListener("click", () => resetAllFilters());
    document.getElementById("addRowBtn")?.addEventListener("click", () => addNewCharacter());
    document.getElementById("exportBtn")?.addEventListener("click", () => exportToCSV());
    document.getElementById("importBtn")?.addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile")?.addEventListener("change", (e) => { if(e.target.files[0]) importCSV(e.target.files[0]); });
    document.getElementById("resetDemoBtn")?.addEventListener("click", () => resetToDemo());
    document.getElementById("syncNowBtn")?.addEventListener("click", () => syncFromAirtable());

    async function init() {
        await loadFromAirtable();
        buildFiltersUI();
        applyFilters();
        setInterval(() => syncFromAirtable(), 30000);
    }
    init();
</script>
</body>
